name: Deploy Gateway

on:
  push:
    branches:
      - main

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Amazon Corretto JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "corretto"
          java-version: "21"
          cache: maven

      - name: Run Maven tests
        run: ./mvnw -B clean verify

      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Deploy to production via SSH
        uses: appleboy/ssh-action@master
        env:
          APP_VERSION: ${{ steps.vars.outputs.sha_short }}
        with:
          host: ${{ secrets.GATEWAY_SSH_HOST }}
          username: ${{ secrets.GATEWAY_SSH_USER }}
          key: ${{ secrets.GATEWAY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.GATEWAY_REMOTE_APP_DIR }}"
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            cd "${{ secrets.GATEWAY_REMOTE_COMPOSE_DIR }}"
            APP_VERSION=${APP_VERSION:-latest} docker compose up --build -d --remove-orphans ${{ secrets.GATEWAY_COMPOSE_SERVICE }}
            if [ -n "${{ secrets.GATEWAY_NGINX_CONTAINER }}" ]; then
              docker exec ${{ secrets.GATEWAY_NGINX_CONTAINER }} nginx -t
              docker exec ${{ secrets.GATEWAY_NGINX_CONTAINER }} nginx -s reload
            fi
