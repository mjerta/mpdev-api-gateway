name: Deploy Gateway

on:
  push:
    branches:
      - main

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Amazon Corretto JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "corretto"
          java-version: "21"
          cache: maven

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          fetch_all_tags: true
          custom_release_rules: |
            breaking:major,
            feature:minor,
            feat:minor,
            fix:patch,
            perf:patch

      - name: Create a GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Maven tests
        run: ./mvnw -B clean verify

      - name: Deploy to production via SSH
        uses: appleboy/ssh-action@master
        env:
          APP_VERSION: ${{ steps.tag_version.outputs.new_tag }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.GATEWAY_REMOTE_APP_DIR }}"
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            cd "${{ secrets.GATEWAY_REMOTE_COMPOSE_DIR }}"
            APP_VERSION=${APP_VERSION:-latest} docker compose up --build -d --remove-orphans ${{ secrets.GATEWAY_COMPOSE_SERVICE }}
            if [ -n "${{ secrets.GATEWAY_NGINX_CONTAINER }}" ]; then
              docker exec ${{ secrets.GATEWAY_NGINX_CONTAINER }} nginx -t
              docker exec ${{ secrets.GATEWAY_NGINX_CONTAINER }} nginx -s reload
            fi
