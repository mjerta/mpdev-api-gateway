version: '3.9'

services:
  gateway-db:
    image: postgres:15
    container_name: gateway-db
    restart: unless-stopped
    env_file:
      - .env.gateway-db
    ports:
      - "${GATEWAY_DB_PORT:-5433}:5432"
    volumes:
      - pg_gateway_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_gateway_data:
