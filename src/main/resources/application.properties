spring.application.name=gateway-service
server.port=8765
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
spring.cloud.gateway.server.webmvc.discovery.locator.enabled=true
spring.cloud.gateway.server.webmvc.discovery.locator.lower-case-service-id=true
spring.cloud.gateway.server.webmvc.routes[0].id=project-manager-backend
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://PROJECT-MANAGER-BACKEND
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/project-manager-backend/**
spring.cloud.gateway.server.webmvc.routes[0].filters[0]=StripPrefix=1
