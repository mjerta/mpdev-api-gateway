spring:
  datasource:
    url: jdbc:h2:mem:gatewaydb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test
            client-secret: test
            scope: openid,profile,email
        provider:
          google:
            issuer-uri: https://accounts.google.com
jwt:
  secret: T4zXHkMZ2rqqVbAbmztihVlEfKix6mCXx7DZcgfP/WY=
  expiration-seconds: 3600
app:
  admin:
    email: test@example.com
